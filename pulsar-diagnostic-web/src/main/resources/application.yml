server:
  port: 8080

spring:
  application:
    name: pulsar-diagnostic-agent
  main:
    allow-bean-definition-overriding: true
    web-application-type: servlet
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.web.reactive.WebFluxAutoConfiguration
      - org.springframework.boot.autoconfigure.web.reactive.ReactiveWebServerFactoryAutoConfiguration

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      chat:
        base-url: https://dashscope.aliyuncs.com/compatible-mode
        options:
          model: qwen-plus
          temperature: 0.7
      embedding:
        base-url: https://dashscope.aliyuncs.com/compatible-mode
        options:
          model: text-embedding-v3

# MCP Server Configuration
mcp:
  server-url: ${MCP_SERVER_URL:http://localhost:8000}
  timeout: ${MCP_TIMEOUT:30s}
  enabled: ${MCP_ENABLED:true}
  max-retries: ${MCP_MAX_RETRIES:3}
  retry-delay-ms: ${MCP_RETRY_DELAY_MS:1000}

pulsar:
  admin-url: ${PULSAR_ADMIN_URL:http://localhost:8080}
  broker-url: ${PULSAR_BROKER_URL:pulsar://localhost:6650}
  prometheus-url: ${PROMETHEUS_URL:http://localhost:9090}
  cluster-name: ${PULSAR_CLUSTER_NAME:standalone}
  connection-timeout-seconds: 30
  request-timeout-seconds: 60
  tls-enabled: false
  auth-token: ${PULSAR_AUTH_TOKEN:}
  log-paths:
    broker: ${PULSAR_BROKER_LOGS:/var/log/pulsar/broker}
    bookie: ${PULSAR_BOOKIE_LOGS:/var/log/pulsar/bookkeeper}
    zookeeper: ${PULSAR_ZK_LOGS:/var/log/pulsar/zookeeper}
    proxy: ${PULSAR_PROXY_LOGS:/var/log/pulsar/proxy}

pulsar-diagnostic:
  knowledge:
    embedding-file: ${KNOWLEDGE_EMBEDDING_FILE:}
    auto-load: true
  rag:
    enabled: ${RAG_ENABLED:true}
    retrieval:
      top-k: ${RAG_RETRIEVAL_TOP_K:20}
      vector-weight: ${RAG_VECTOR_WEIGHT:0.6}
      bm25-weight: ${RAG_BM25_WEIGHT:0.4}
    rerank:
      enabled: ${RAG_RERANK_ENABLED:true}
      top-k: ${RAG_RERANK_TOP_K:5}
      batch-size: ${RAG_RERANK_BATCH_SIZE:5}
      timeout-seconds: ${RAG_RERANK_TIMEOUT:30}
    query-enhancement:
      enabled: ${RAG_QUERY_ENHANCE_ENABLED:true}
      expansion-count: ${RAG_QUERY_EXPANSION_COUNT:3}
  orchestration:
    # 并行获取超时
    parallel-timeout-ms: ${ORCHESTRATION_PARALLEL_TIMEOUT_MS:10000}
    # MCP 数据获取超时
    mcp-timeout-ms: ${ORCHESTRATION_MCP_TIMEOUT_MS:5000}
    # 知识检索超时
    knowledge-timeout-ms: ${ORCHESTRATION_KNOWLEDGE_TIMEOUT_MS:5000}
  mcp:
    timeout-ms: ${MCP_DATA_TIMEOUT_MS:5000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,caches
  endpoint:
    health:
      show-details: always
    metrics:
      enabled: true
  metrics:
    enable:
      all: true
    distribution:
      percentiles-histogram:
        http.server.requests: true

logging:
  level:
    root: INFO
    com.pulsar.diagnostic: DEBUG
    org.apache.pulsar: WARN
    org.springframework.ai: DEBUG
    org.springframework.ai.openai: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
