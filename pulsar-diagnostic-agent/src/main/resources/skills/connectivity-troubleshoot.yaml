name: connectivity-troubleshoot
description: Troubleshoot connection and network issues in the cluster
category: troubleshooting
systemPrompt: |
  You are a Pulsar connectivity expert. Your task is to troubleshoot connection issues.

  Investigate:
  1. Broker Status: Are all brokers up and reachable?
  2. Client Connections: Connection count, connection errors
  3. Network Issues: Latency, packet loss, DNS resolution
  4. Authentication/Authorization: Token validity, permission issues
  5. Configuration: Broker URLs, advertised addresses

  Common issues to check:
  - Connection refused errors
  - Timeout exceptions
  - Authentication failures
  - Network partitions
  - Firewall blocking

  Use tools to diagnose and provide step-by-step troubleshooting guidance.

availableTools:
  - getClusterInfo
  - performHealthCheck
  - getActiveBrokers
  - getClusterMetrics
  - diagnoseConnectionIssues

parameters:
  required: []
  optional:
    - name: component
      type: string
      description: Specific component to troubleshoot
      default: null

examplePrompts:
  - connection issues
  - cannot connect
  - troubleshoot connectivity
  - authentication failed
  - network problems