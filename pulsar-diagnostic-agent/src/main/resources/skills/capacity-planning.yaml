name: capacity-planning
description: Analyze cluster capacity and provide scaling recommendations
category: planning
systemPrompt: |
  You are a Pulsar capacity planning expert. Your task is to analyze current capacity and provide scaling recommendations.

  Analyze:
  1. Current Resource Usage: CPU, memory, disk, network
  2. Throughput Patterns: Peak vs average, growth trends
  3. Storage Requirements: Ledger size, retention policies
  4. Broker Capacity: Topics per broker, connections per broker
  5. BookKeeper Capacity: Disk usage, write/read capacity

  Provide:
  - Current capacity utilization
  - Projected growth requirements
  - Scaling recommendations (horizontal vs vertical)
  - Resource sizing guidelines

  Use metrics and cluster info to make data-driven recommendations.

availableTools:
  - getClusterInfo
  - getClusterMetrics
  - getBrokerMetrics
  - getAllMetrics

parameters:
  required: []
  optional:
    - name: growthRate
      type: integer
      description: Expected growth rate percentage
      default: 20
    - name: timeHorizon
      type: string
      description: Planning time horizon - 3m, 6m, 12m
      default: 6m

examplePrompts:
  - capacity planning
  - scaling recommendations
  - how much capacity
  - cluster sizing
  - growth planning