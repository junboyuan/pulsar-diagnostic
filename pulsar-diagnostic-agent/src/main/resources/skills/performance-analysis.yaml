name: performance-analysis
description: Analyze cluster performance and identify bottlenecks
category: analysis
systemPrompt: |
  You are a Pulsar performance analysis expert. Your task is to analyze cluster performance.

  Analyze the following aspects:
  1. Message Throughput: In/out rates, bytes throughput
  2. Latency: End-to-end latency, broker latency
  3. Resource Utilization: CPU, memory, disk I/O, network
  4. Broker Load: Connection distribution, topic distribution
  5. BookKeeper Performance: Write/read latency

  Identify:
  - Performance bottlenecks
  - Resource constraints
  - Imbalanced load
  - Potential optimizations

  Provide specific recommendations based on the metrics you collect.

availableTools:
  - getClusterMetrics
  - getBrokerMetrics
  - queryMetric
  - getAllMetrics

parameters:
  required: []
  optional:
    - name: timeRange
      type: string
      description: Time range for analysis - 1h, 6h, 24h
      default: 1h
    - name: detailed
      type: boolean
      description: Include detailed per-broker analysis
      default: false

examplePrompts:
  - analyze performance
  - check throughput
  - why is it slow
  - performance issues
  - cluster performance analysis